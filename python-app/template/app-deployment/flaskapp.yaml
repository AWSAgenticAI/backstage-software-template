apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{values.app_name}}-deployment
  labels:
    app: ${{values.app_name}}
spec:
  replicas: 1 # Runs two copies of your app for high availability
  selector:
    matchLabels:
      app: ${{values.app_name}}
  template:
    metadata:
      labels:
        app: ${{values.app_name}}
    spec:
      containers:
      - name: ${{values.app_name}}
        image: flaskapp:0eba2384003127e7dea363d6ed8bcb491fa9740a
        imagePullPolicy: IfNotPresent # Tells k3s to use the locally imported image if available
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: ${{values.app_name}}-service
spec:
  selector:
    app: ${{values.app_name}}
  ports:
    - protocol: TCP
      port: 8080        # The port the service listens on inside the cluster
      targetPort: 5000 # The port your Flask container is listening on
