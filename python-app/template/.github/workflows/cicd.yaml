on:
  push:
    branches: [ "main" ]

# Grant permission to the pipeline to write back to your Git repository
permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted]
    steps:
    - uses: actions/checkout@v4
    
    - name: Build and Import Docker image
      run: |
       # Tag and import the image with the unique GitHub commit SHA
       sudo docker build -t ${{ values.app_name }}:${{ '${{ github.sha }}' }} .
       sudo docker save ${{values.app_name}}:${{ '${{ github.sha }}'}} | sudo k3s ctr images import -

  deploy:
    needs: build
    runs-on: [self-hosted]
    steps:
    - uses: actions/checkout@v4
      with:
        # Fetch full history so we can push back safely
        fetch-depth: 0 
        # Explicitly tells the checkout action to keep the token active for pushing
        persist-credentials: true
    
    - name: Update Deployment Image Tag in Git
      run: |
        # Change the image tag inside your deployment sub-directory
        sed -i 's|image: ${{ values.app_name }}:.*|image: ${{ values.app_name }}:${{ '${{ github.sha }}' }}|g' app-deployment/flaskapp.yaml

        # Configure local git user profile
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Only commit and push if the file actually changed
        if git diff --quiet app-deployment/flaskapp.yaml; then
          echo "No changes detected in deployment file. Skipping commit."
        else
          git add app-deployment/flaskapp.yaml
          git commit -m "chore: update ${{ values.app_name }} image tag to ${{ '${{ github.sha }}' }} [skip ci]"
          git push origin main
        fi
    - name: deploy python app ${{values.app_name}} 
      run: |
        sudo kubectl apply -f argocd-flaskapp.yaml
    - name: Force ArgoCD to Hard Refresh and Sync
      run: |
        # Extract just the repository name (e.g., "my-flask-app" from "owner/my-flask-app")
        APP_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        
        echo "Targeting ArgoCD Application: ${APP_NAME}-app"
        
        # Safely run the patch command using the shell variable
        sudo kubectl patch application "${APP_NAME}-app" -n argocd --type=merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
